<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1020"/>
      <stop offset="60%" stop-color="#1B1F3A"/>
      <stop offset="100%" stop-color="#2B1F14"/>
    </linearGradient>
    <radialGradient id="graceGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFD777" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#FFB74A" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
