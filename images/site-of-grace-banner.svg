    <circle cx="0" cy="25" r="120" fill="url(#graceGlow)"/>

    <path d="M0 10 L0 -95" stroke="#F4C35A" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 -95 L-18 -118" stroke="#F4C35A" stroke-width="4" stroke-linecap="round"/>
