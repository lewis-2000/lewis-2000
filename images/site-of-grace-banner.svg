    <path d="M-40 75 C-18 55 -10 30 0 12 C10 30 18 55 40 75" stroke="#FFD777" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M-58 81 C-25 55 -15 28 0 -2 C15 28 25 55 58 81" stroke="#FFB84D" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>
  </g>

