      }
      .caption {
        font-family: 'Trebuchet MS', Verdana, sans-serif;
        font-size: 22px;
        fill: #FFD777;
      }
    </style>
  </defs>

  <rect width="1200" height="420" rx="22" fill="url(#bgGrad)"/>

  <g opacity="0.35">
    <circle cx="160" cy="70" r="1.5" fill="#FFFFFF"/>
    <circle cx="320" cy="120" r="1" fill="#FFFFFF"/>
    <circle cx="410" cy="60" r="1.8" fill="#FFFFFF"/>
    <circle cx="930" cy="85" r="1.5" fill="#FFFFFF"/>
    <circle cx="1060" cy="130" r="1.1" fill="#FFFFFF"/>
    <circle cx="1140" cy="70" r="1.4" fill="#FFFFFF"/>
  </g>

  <g transform="translate(600 220)">
